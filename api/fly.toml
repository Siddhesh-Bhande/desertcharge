# Fly.io deploy config. Secrets (DATABASE_URL, OPENCHARGEMAP_API_KEY, NREL_API_KEY)
# are set with `fly secrets set ...`, never committed here.
app = "desertcharge-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/api/health"
  interval = "30s"
  timeout = "5s"

[env]
  ALLOWED_ORIGINS = "http://localhost:5173"
